<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperació JS A-Frame</title>
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.7.1/dist/aframe-master.min.js"></script>
</head>
<body>

<a-scene cursor="rayOrigin: mouse">

    <a-assets>
        <img id="sky" src="assets/sky.jpg">
        <img id="terra" src="assets/terra.jpg">
        <img id="trama" src="assets/trama.jpg">

        <a-asset-item id="model3D" src="assets/model.glb"></a-asset-item>
        <a-asset-item id="clau3D" src="assets/clau.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 1.6 5">
        <a-cursor color="red" raycaster="objects: none"></a-cursor>
    </a-camera>

    <a-sky src="#sky"></a-sky>

    <a-plane
        src="#terra"
        position="0 0 0"
        rotation="-90 0 0"
        width="50"
        height="50">
    </a-plane>

    <a-dodecahedron
        position="4 2 -5"
        src="#trama"
        scale="1 1 1"
        animation="
            property: scale;
            from: 1 1 1;
            to: 1.2 1.2 1.2;
            dur: 2000;
            dir: alternate;
            loop: true;
            easing: easeInOutQuad;">
    </a-dodecahedron>

    <a-entity
        gltf-model="#model3D"
        position="0 1 -3"
        scale="2.5 2.5 2.5"
        animation="
            property: rotation;
            to: 0 360 0;
            dur: 5000;
            loop: true;
            easing: linear;">
    </a-entity>

    <a-box
        id="caja"
        position="-4 2 -3"
        color="red">
    </a-box>

    <a-entity
        id="clau"
        gltf-model="#clau3D"
        position="2 2 -4"
        scale="0.002 0.002 0.002">
    </a-entity>

</a-scene>

<script>
    // 1. Rotació de la caixa en fer clic
    const caja = document.querySelector("#caja");
    caja.addEventListener("click", () => {
        caja.setAttribute(
            "animation",
            "property: rotation; to: 0 360 0; dur: 2000; loop: true; easing: linear"
        );
    });

    // 2. Navegació a pagina2.html en fer clic a la clau
    const clau = document.querySelector("#clau");
    clau.addEventListener("click", () => {
        window.location.href = "pagina2.html";
    });
</script>

</body>
</html>
